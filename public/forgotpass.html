<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QIU Lost & Found - Reset Password</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1rem;
            z-index: 1;
        }
        
        #searchForm input, #resetForm input {
            padding-left: 45px !important;
            margin-bottom: 0;
            width: 100%;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .auth-card {
            max-width: 450px;
            width: 90%;
            margin: 0 auto;
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .auth-logo i {
            font-size: 3rem;
            color: #003366;
            background: white;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 1rem;
        }
        
        .auth-logo h1 {
            font-size: 1.8rem;
            color: #003366;
            margin: 0;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .back-link a {
            color: #00509d;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-link a:hover {
            color: #003366;
            transform: translateX(-5px);
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button[type="submit"]:hover {
            background: #00509d;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .info-text {
            color: #64748b;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        
        .user-info {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .user-info p {
            margin: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-info i {
            color: #00509d;
            width: 20px;
        }
        
        .password-strength {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s ease;
        }
        
        .strength-weak {
            background: #ef4444;
        }
        
        .strength-medium {
            background: #f59e0b;
        }
        
        .strength-strong {
            background: #10b981;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        
        .step-number {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e2e8f0;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .step.active .step-number {
            background: #003366;
            color: white;
        }
        
        .step-label {
            font-size: 0.8rem;
            color: #64748b;
        }
        
        .step.active .step-label {
            color: #003366;
            font-weight: 500;
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fas fa-university"></i>
            <h1>QIU Lost & Found</h1>
        </div>
        
        <!-- Step Indicator -->
        <div class="step-indicator">
            <div class="step active" id="step1Indicator">
                <div class="step-number">1</div>
                <div class="step-label">Search</div>
            </div>
            <div class="step" id="step2Indicator">
                <div class="step-number">2</div>
                <div class="step-label">Reset</div>
            </div>
        </div>
        
        <!-- Step 1: Search Form -->
        <div id="step1">
            <h2 style="text-align: center; margin-bottom: 0.5rem; color: #0f172a;">Find Your Account</h2>
            
            <div class="info-text">
                <i class="fas fa-info-circle"></i> Enter your username or email to search for your account.
            </div>
            
            <form id="searchForm">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="searchQuery" placeholder="Username or Email" required>
                </div>
                
                <button type="submit" id="searchBtn">
                    <i class="fas fa-search"></i> Search Account
                </button>
            </form>
        </div>
        
        <!-- Step 2: Reset Form (Hidden Initially) -->
        <div id="step2" style="display: none;">
            <h2 style="text-align: center; margin-bottom: 0.5rem; color: #0f172a;">Reset Password</h2>
            
            <div class="user-info" id="userInfo"></div>
            
            <form id="resetForm">
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="newPassword" placeholder="New Password" required minlength="6">
                </div>
                
                <div class="password-strength" id="strengthContainer" style="display: none;">
                    <div id="strengthBar" class="password-strength-bar"></div>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm New Password" required minlength="6">
                </div>
                
                <div id="passwordMatch" style="font-size: 0.85rem; margin-bottom: 1rem; display: none;"></div>
                
                <button type="submit" id="resetBtn">
                    <i class="fas fa-key"></i> Reset Password
                </button>
            </form>
        </div>
        
        <div id="messageContainer"></div>
        
        <div class="back-link">
            <a href="auth.html">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000';
        let foundUser = null;
        
        // Password strength check
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const strengthBar = document.getElementById('strengthBar');
        const strengthContainer = document.getElementById('strengthContainer');
        
        if (newPassword) {
            newPassword.addEventListener('input', function() {
                checkPasswordStrength(this.value);
                checkPasswordsMatch();
            });
        }
        
        if (confirmPassword) {
            confirmPassword.addEventListener('input', checkPasswordsMatch);
        }
        
        function checkPasswordStrength(password) {
            const requirements = {
                length: password.length >= 6,
                lower: /[a-z]/.test(password),
                upper: /[A-Z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[$@#&!]/.test(password)
            };
            
            const strength = Object.values(requirements).filter(Boolean).length;
            const percentage = (strength / 5) * 100;
            
            if (password.length > 0) {
                strengthContainer.style.display = 'block';
                strengthBar.style.width = percentage + '%';
                
                strengthBar.className = 'password-strength-bar';
                if (percentage < 40) {
                    strengthBar.classList.add('strength-weak');
                } else if (percentage < 70) {
                    strengthBar.classList.add('strength-medium');
                } else {
                    strengthBar.classList.add('strength-strong');
                }
            } else {
                strengthContainer.style.display = 'none';
            }
        }
        
        function checkPasswordsMatch() {
            const matchDiv = document.getElementById('passwordMatch');
            if (!matchDiv) return;
            
            const newVal = newPassword ? newPassword.value : '';
            const confirmVal = confirmPassword ? confirmPassword.value : '';
            
            if (confirmVal.length > 0) {
                if (newVal === confirmVal) {
                    matchDiv.style.display = 'block';
                    matchDiv.innerHTML = '<i class="fas fa-check-circle" style="color: #10b981;"></i> <span style="color: #10b981;">Passwords match</span>';
                } else {
                    matchDiv.style.display = 'block';
                    matchDiv.innerHTML = '<i class="fas fa-exclamation-circle" style="color: #ef4444;"></i> <span style="color: #ef4444;">Passwords do not match</span>';
                }
            } else {
                matchDiv.style.display = 'none';
            }
        }
        
        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `
                <div class="${type}-message">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                    ${message}
                </div>
            `;
        }
        
        function clearMessage() {
            document.getElementById('messageContainer').innerHTML = '';
        }
        
        function updateStep(step) {
            const step1 = document.getElementById('step1Indicator');
            const step2 = document.getElementById('step2Indicator');
            const step1Content = document.getElementById('step1');
            const step2Content = document.getElementById('step2');
            
            if (step === 1) {
                step1.classList.add('active');
                step2.classList.remove('active');
                step1Content.style.display = 'block';
                step2Content.style.display = 'none';
            } else {
                step1.classList.remove('active');
                step2.classList.add('active');
                step1Content.style.display = 'none';
                step2Content.style.display = 'block';
            }
        }
        
        // Search Form Submission
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const searchQuery = document.getElementById('searchQuery').value.trim();
            const searchBtn = document.getElementById('searchBtn');
            
            clearMessage();
            
            if (!searchQuery) {
                showMessage('Please enter a username or email', 'error');
                return;
            }
            
            searchBtn.disabled = true;
            searchBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Searching...';
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/search-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: searchQuery })
                });
                
                const data = await res.json();
                
                if (res.ok && data.found) {
                    foundUser = data.user;
                    
                    const userInfo = document.getElementById('userInfo');
                    userInfo.innerHTML = `
                        <p><i class="fas fa-user"></i> <strong>Username:</strong> ${escapeHtml(data.user.username)}</p>
                        <p><i class="fas fa-envelope"></i> <strong>Email:</strong> ${escapeHtml(data.user.email)}</p>
                    `;
                    
                    updateStep(2);
                    clearMessage();
                } else {
                    showMessage(data.error || 'User not found', 'error');
                }
            } catch (error) {
                showMessage('Cannot connect to server. Make sure it\'s running on port 3000.', 'error');
            } finally {
                searchBtn.disabled = false;
                searchBtn.innerHTML = '<i class="fas fa-search"></i> Search Account';
            }
        });
        
        // Reset Form Submission
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');
            
            clearMessage();
            
            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting Password...';
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/reset-password-direct`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId: foundUser.id, 
                        newPassword: newPassword 
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showMessage('Password reset successful! Redirecting to login...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'auth.html';
                    }, 2000);
                } else {
                    showMessage(data.error || 'Failed to reset password', 'error');
                    resetBtn.disabled = false;
                    resetBtn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
                resetBtn.disabled = false;
                resetBtn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
            }
        });
        
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
