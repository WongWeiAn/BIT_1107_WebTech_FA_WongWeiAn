<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QIU Lost & Found - Reset Password</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1rem;
            z-index: 1;
        }
        
        #resetPasswordForm input {
            padding-left: 45px !important;
            margin-bottom: 0;
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .password-strength {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s ease;
        }
        
        .strength-weak {
            background: #ef4444;
        }
        
        .strength-medium {
            background: #f59e0b;
        }
        
        .strength-strong {
            background: #10b981;
        }
        
        .password-requirements {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 1rem;
            padding: 0.5rem;
            background: #f8fafc;
            border-radius: 8px;
        }
        
        .requirement-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 5px 0;
        }
        
        .auth-card {
            max-width: 450px;
            width: 90%;
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .auth-logo i {
            font-size: 3rem;
            color: #003366;
            background: white;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 1rem;
        }
        
        .auth-logo h1 {
            font-size: 1.8rem;
            color: #003366;
            margin: 0;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .back-link a {
            color: #00509d;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-link a:hover {
            color: #003366;
            transform: translateX(-5px);
        }
        
        button[type="submit"] {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button[type="submit"]:hover {
            background: #00509d;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fas fa-university"></i>
            <h1>QIU Lost & Found</h1>
        </div>
        
        <h2 style="text-align: center; margin-bottom: 0.5rem; color: #0f172a;">Reset Password</h2>
        
        <div style="color: #64748b; text-align: center; margin-bottom: 2rem; font-size: 0.95rem;">
            <i class="fas fa-info-circle"></i> Enter your new password below.
        </div>
        
        <form id="resetPasswordForm">
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="newPassword" placeholder="New Password" required minlength="6">
            </div>
            
            <div class="password-strength" id="strengthContainer" style="display: none;">
                <div id="strengthBar" class="password-strength-bar"></div>
            </div>
            
            <div class="password-requirements">
                <div class="requirement-item" id="reqLength">
                    <i class="far fa-circle"></i> At least 6 characters
                </div>
                <div class="requirement-item" id="reqLower">
                    <i class="far fa-circle"></i> At least 1 lowercase letter
                </div>
                <div class="requirement-item" id="reqUpper">
                    <i class="far fa-circle"></i> At least 1 uppercase letter
                </div>
                <div class="requirement-item" id="reqNumber">
                    <i class="far fa-circle"></i> At least 1 number
                </div>
                <div class="requirement-item" id="reqSpecial">
                    <i class="far fa-circle"></i> At least 1 special character (@$#&!)
                </div>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm New Password" required minlength="6">
            </div>
            
            <div id="passwordMatch" style="font-size: 0.85rem; margin-bottom: 1rem; display: none;"></div>
            
            <button type="submit" id="submitBtn">
                <i class="fas fa-key"></i> Reset Password
            </button>
        </form>
        
        <div id="messageContainer"></div>
        
        <div class="back-link">
            <a href="auth.html">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            window.location.href = 'forgotpass.html';
        }
        
        async function verifyToken() {
            try {
                const res = await fetch('http://localhost:3000/api/verify-reset-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                
                if (!res.ok) {
                    const data = await res.json();
                    showMessage(data.error || 'Invalid or expired token', 'error');
                    setTimeout(() => {
                        window.location.href = 'forgotpass.html';
                    }, 3000);
                }
            } catch (error) {
                console.error('Token verification error:', error);
            }
        }
        
        verifyToken();
        
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const strengthBar = document.getElementById('strengthBar');
        const strengthContainer = document.getElementById('strengthContainer');
        
        function checkPasswordStrength(password) {
            const requirements = {
                length: password.length >= 6,
                lower: /[a-z]/.test(password),
                upper: /[A-Z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[$@#&!]/.test(password)
            };
            
            document.getElementById('reqLength').innerHTML = `<i class="fas ${requirements.length ? 'fa-check-circle' : 'far fa-circle'}" style="color: ${requirements.length ? '#10b981' : '#64748b'}"></i> At least 6 characters`;
            document.getElementById('reqLower').innerHTML = `<i class="fas ${requirements.lower ? 'fa-check-circle' : 'far fa-circle'}" style="color: ${requirements.lower ? '#10b981' : '#64748b'}"></i> At least 1 lowercase letter`;
            document.getElementById('reqUpper').innerHTML = `<i class="fas ${requirements.upper ? 'fa-check-circle' : 'far fa-circle'}" style="color: ${requirements.upper ? '#10b981' : '#64748b'}"></i> At least 1 uppercase letter`;
            document.getElementById('reqNumber').innerHTML = `<i class="fas ${requirements.number ? 'fa-check-circle' : 'far fa-circle'}" style="color: ${requirements.number ? '#10b981' : '#64748b'}"></i> At least 1 number`;
            document.getElementById('reqSpecial').innerHTML = `<i class="fas ${requirements.special ? 'fa-check-circle' : 'far fa-circle'}" style="color: ${requirements.special ? '#10b981' : '#64748b'}"></i> At least 1 special character (@$#&!)`;
            
            const strength = Object.values(requirements).filter(Boolean).length;
            const percentage = (strength / 5) * 100;
            
            if (password.length > 0) {
                strengthContainer.style.display = 'block';
                strengthBar.style.width = percentage + '%';
                
                strengthBar.className = 'password-strength-bar';
                if (percentage < 40) {
                    strengthBar.classList.add('strength-weak');
                } else if (percentage < 70) {
                    strengthBar.classList.add('strength-medium');
                } else {
                    strengthBar.classList.add('strength-strong');
                }
            } else {
                strengthContainer.style.display = 'none';
            }
            
            return requirements;
        }
        
        newPassword.addEventListener('input', function() {
            checkPasswordStrength(this.value);
            checkPasswordsMatch();
        });
        
        confirmPassword.addEventListener('input', checkPasswordsMatch);
        
        function checkPasswordsMatch() {
            const matchDiv = document.getElementById('passwordMatch');
            const newVal = newPassword.value;
            const confirmVal = confirmPassword.value;
            
            if (confirmVal.length > 0) {
                if (newVal === confirmVal) {
                    matchDiv.style.display = 'block';
                    matchDiv.innerHTML = '<i class="fas fa-check-circle" style="color: #10b981;"></i> <span style="color: #10b981;">Passwords match</span>';
                } else {
                    matchDiv.style.display = 'block';
                    matchDiv.innerHTML = '<i class="fas fa-exclamation-circle" style="color: #ef4444;"></i> <span style="color: #ef4444;">Passwords do not match</span>';
                }
            } else {
                matchDiv.style.display = 'none';
            }
        }
        
        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `
                <div class="${type}-message">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                    ${message}
                </div>
            `;
        }
        
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const messageContainer = document.getElementById('messageContainer');
            
            messageContainer.innerHTML = '';
            
            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting Password...';
            
            try {
                const res = await fetch('http://localhost:3000/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    messageContainer.innerHTML = `
                        <div class="success-message">
                            <i class="fas fa-check-circle"></i>
                            <div>
                                <strong>Password reset successful!</strong><br>
                                Your password has been updated. Redirecting to login page...
                            </div>
                        </div>
                    `;
                    
                    setTimeout(() => {
                        window.location.href = 'auth.html';
                    }, 3000);
                } else {
                    showMessage(data.error || 'Failed to reset password', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-key"></i> Reset Password';
            }
        });
    </script>
</body>
</html>
